# NomadWay Docker Compose Configuration
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: nomadway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nomadway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nomadway_password}
      POSTGRES_DB: ${POSTGRES_DB:-nomadway}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No host port binding — backend reaches postgres over the docker network.
    # Host port 5432 is used by another project's database on this VPS.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nomadway}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nomadway-network

  # Backend API Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: nomadway-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-nomadway}:${POSTGRES_PASSWORD:-nomadway_password}@postgres:5432/${POSTGRES_DB:-nomadway}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GOOGLE_CLIENT_ID_WEB: ${GOOGLE_CLIENT_ID_WEB}
      GOOGLE_CLIENT_ID_ANDROID: ${GOOGLE_CLIENT_ID_ANDROID}
      GOOGLE_CLIENT_ID_IOS: ${GOOGLE_CLIENT_ID_IOS}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      NVIDIA_LLM_API_KEY: ${NVIDIA_LLM_API_KEY}
      NVIDIA_EMBED_API_KEY: ${NVIDIA_EMBED_API_KEY}
      NVIDIA_LLM_MODEL: ${NVIDIA_LLM_MODEL:-minimaxai/minimax-m2.7}
      NVIDIA_EMBED_MODEL: ${NVIDIA_EMBED_MODEL:-nvidia/llama-3.2-nv-embedqa-1b-v2}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      RAG_TOP_K: ${RAG_TOP_K:-8}
      RAG_INDEX_PATH: ${RAG_INDEX_PATH:-data/rag-index.json}
      ROUTE_CURATOR_TIMEOUT_MS: ${ROUTE_CURATOR_TIMEOUT_MS:-5000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - "3001:3001"
    volumes:
      - nomadway_apks:/app/public/apk
    command: sh -c "npx prisma migrate deploy && node src/index.js"
    networks:
      - nomadway-network

  # Website Frontend
  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: nomadway-website
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ${APK_HOST_PATH:-./website/public/nomadway.apk}:/usr/share/nginx/html/nomadway.apk:ro
    networks:
      - nomadway-network

  # Caddy reverse proxy with automatic Let's Encrypt SSL
  caddy:
    image: caddy:2-alpine
    container_name: nomadway-caddy
    restart: unless-stopped
    depends_on:
      - website
    # Port 80 is held by another project's nginx on this VPS; Caddy renews
    # certs via TLS-ALPN-01 on 443 instead (see caddy/Caddyfile).
    ports:
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - nomadway-network

  # Prisma Studio (optional, for database management)
  prisma-studio:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: nomadway-prisma-studio
    profiles:
      - tools
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nomadway}:${POSTGRES_PASSWORD:-nomadway_password}@postgres:5432/${POSTGRES_DB:-nomadway}?schema=public
    ports:
      - "5555:5555"
    command: ["npx", "prisma", "studio", "--port", "5555"]
    networks:
      - nomadway-network

volumes:
  postgres_data:
    driver: local
  nomadway_apks:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  nomadway-network:
    driver: bridge
